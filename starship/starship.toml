# Starship prompt. Palette tracks the Tango Dark theme used across the stack.
add_newline = true

format = """
$directory\
$git_branch\
$git_status\
$nix_shell\
$python$nodejs$rust$golang$elixir\
$cmd_duration\
$line_break\
$character"""

palette = "tango"

[palettes.tango]
bg = "#000000"
fg = "#d3d7cf"
blue = "#729fcf"
cyan = "#34e2e2"
green = "#8ae234"
magenta = "#ad7fa8"
orange = "#f57900"
red = "#ef2929"
yellow = "#fce94f"
grey = "#888a85"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[directory]
style = "bold blue"
truncation_length = 3
truncate_to_repo = true
read_only = " "

[git_branch]
symbol = " "
style = "bold magenta"

[git_status]
style = "bold red"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
modified = "!${count}"
staged = "+${count}"
stashed = "*${count}"
deleted = "✘${count}"

[cmd_duration]
min_time = 2000
style = "bold yellow"
format = "took [$duration]($style) "

[nix_shell]
symbol = " "
style = "bold cyan"
format = "via [$symbol$name]($style) "

[python]
symbol = " "
style = "bold yellow"

[nodejs]
symbol = " "
style = "bold green"

[rust]
symbol = " "
style = "bold orange"

[golang]
symbol = " "
style = "bold cyan"

[elixir]
symbol = " "
style = "bold magenta"
